name: "Build, Create Release & Update Scoop Manifest"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-scoop:
    name: "Build exe, create release, update scoop manifest"
    runs-on: windows-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install build tooling"
        run: python -m pip install --upgrade pip build pyinstaller

      - name: "Get version from tag"
        id: version_from_tag
        shell: powershell
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "Tag: $tag -> Version: $version"

      - name: "Build wheel and exe"
        shell: powershell
        run: |
          pip install -e .
          python -m build --wheel
          python -m PyInstaller context-life.spec --distpath dist --workpath build
          if (-not (Test-Path dist/context-life.exe)) { throw "context-life.exe was not generated" }
          echo "=== dist/ contents ==="
          Get-ChildItem dist/ | Format-Table Name, Length, LastWriteTime

      - name: "Get exe hash"
        id: exe_hash
        shell: powershell
        run: |
          $exeHash = (Get-FileHash dist/context-life.exe -Algorithm SHA256 | Select-Object -ExpandProperty Hash)
          echo "EXE_HASH=$exeHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "SHA256: $exeHash"

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_from_tag.outputs.TAG }}
          name: "Context-Life ${{ steps.version_from_tag.outputs.VERSION }}"
          files: |
            dist/context-life.exe
            dist/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Update Scoop bucket with real exe hash"
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python scripts/update-scoop-hash.py "${{ steps.exe_hash.outputs.EXE_HASH }}" "${{ steps.version_from_tag.outputs.VERSION }}"
          git add bucket/context-life.json
          git status

      - name: "Commit and push updated manifest"
        shell: powershell
        run: |
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python scripts/update-scoop-hash.py "${{ steps.exe_hash.outputs.EXE_HASH }}" "${{ steps.version_from_tag.outputs.VERSION }}"
          git add bucket/context-life.json
          git diff --cached --quiet bucket/context-life.json
          if ($LASTEXITCODE -eq 0) {
            echo "No changes to commit - bucket manifest is already up to date"
            exit 0
          }
          git commit -m "chore(scoop): update exe hash for v${{ steps.version_from_tag.outputs.VERSION }}"
          git push origin main