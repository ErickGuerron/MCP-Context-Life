name: "Version Sync on Tag"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-version:
    name: "Sync Version Files"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Fetch tags"
        run: git fetch --tags --force

      - name: "Extract version from tag"
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: "Get tag annotation (release notes)"
        run: |
          python scripts/bump-version.py --tag-msg "v${{ steps.version.outputs.VERSION }}" > /tmp/tag-message.txt

      - name: "Run bump-version"
        run: python scripts/bump-version.py ${{ steps.version.outputs.VERSION }}

      - name: "Show changes"
        run: |
          echo "Files changed:"
          git diff --stat

      - name: "Create PR with version sync"
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="chore/sync-version-${{ steps.version.outputs.TAG }}"
          
          # Delete branch if it already exists (from failed previous runs)
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" 2>/dev/null; then
            echo "Branch $BRANCH_NAME exists, deleting it first"
            git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          fi
          
          git checkout -b "$BRANCH_NAME"

          if git diff --quiet; then
            echo "No changes needed — all files already in sync"
            exit 0
          fi

          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync version files to ${{ steps.version.outputs.VERSION }}"

          git push -u origin "$BRANCH_NAME"

          # Build PR body from file
          cat > /tmp/pr-body.txt << 'EOF'
          Automated version sync triggered by tag `{{ steps.version.outputs.TAG }}`.

          ## Changes

          Files updated:
          - pyproject.toml
          - mmcp/__init__.py
          - bucket/context-life.json
          - README.md

          ## Tag Message

          ```
          EOF

                    cat /tmp/tag-message.txt >> /tmp/pr-body.txt

                    cat >> /tmp/pr-body.txt << 'EOF'
          ```

          > This PR is auto-generated by the version-sync workflow.
                    EOF

          # Replace placeholder with actual tag
          sed -i 's/{{ steps.version.outputs.TAG }}/${{ steps.version.outputs.TAG }}/g' /tmp/pr-body.txt

          gh pr create \
            --title "chore: sync version to ${{ steps.version.outputs.VERSION }}" \
            --body-file /tmp/pr-body.txt \
            --base main

  verify-sync:
    name: "Verify Sync"
    runs-on: ubuntu-latest
    needs: sync-version

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Verify all files in sync"
        run: python scripts/bump-version.py --check
