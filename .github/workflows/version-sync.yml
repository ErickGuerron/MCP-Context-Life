name: "Version Sync on Tag"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-version:
    name: "Sync Version Files"
    runs-on: ubuntu-latest

    steps:
      - name: " Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: " Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: " Extract version from tag"
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: " Get tag annotation (release notes)"
        id: tag_msg
        run: |
          TAG_MSG=$(python scripts/bump-version.py --tag-msg "v${{ steps.version.outputs.VERSION }}")
          echo "TAG_MSG=$TAG_MSG" >> $GITHUB_OUTPUT
          echo "TAG_MSG_LENGTH=$(echo "$TAG_MSG" | wc -c)" >> $GITHUB_OUTPUT

      - name: " Run bump-version"
        run: python scripts/bump-version.py ${{ steps.version.outputs.VERSION }}

      - name: " Show changes"
        run: |
          echo "Files changed:"
          git diff --stat

      - name: " Create PR with version sync"
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MSG: ${{ steps.tag_msg.outputs.TAG_MSG }}
        run: |
          git checkout -b chore/sync-version-${{ steps.version.outputs.TAG }}

          if git diff --quiet; then
            echo "No changes needed — all files already in sync"
            exit 0
          fi

          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync version files to ${{ steps.version.outputs.VERSION }}"

          git push -u origin chore/sync-version-${{ steps.version.outputs.TAG }}

          # Build PR body with tag message
          PR_BODY="\
          Automated version sync triggered by tag \`${{ steps.version.outputs.TAG }}\`.

          ## Changes

          Files updated:
          - pyproject.toml
          - mmcp/__init__.py
          - bucket/context-life.json
          - README.md

          ## Tag Message

          \`\`\`
          ${TAG_MSG}
          \`\`\`

          > This PR is auto-generated by the version-sync workflow.
          "

          gh pr create \
            --title "chore: sync version to ${{ steps.version.outputs.VERSION }}" \
            --body "$PR_BODY" \
            --base main

  verify-sync:
    name: "Verify Sync"
    runs-on: ubuntu-latest
    needs: sync-version

    steps:
      - uses: actions/checkout@v4

      - name: " Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: " Verify all files in sync"
        run: python scripts/bump-version.py --check