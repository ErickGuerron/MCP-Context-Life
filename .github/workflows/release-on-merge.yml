name: "Create Release on Merge to Main"

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install build tooling"
        run: python -m pip install --upgrade pip build

      - name: "Detect if this PR introduces a version tag"
        id: detect_tag
        run: |
          git fetch --tags --force
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            PR_BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
            echo "PR base: $PR_BASE_BRANCH"
            VERSION=$(python -c "from pathlib import Path; import re; content = Path('pyproject.toml').read_text(encoding='utf-8'); match = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE); print(match.group(1) if match else '')")
            TAG="v$VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: "Check if tag exists locally"
        id: tag_exists
        run: |
          TAG="${{ steps.detect_tag.outputs.TAG }}"
          if git rev-parse "$TAG^{tag}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: "Build wheel and exe"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        run: |
          pip install pyinstaller
          python -m build --wheel
          python -m PyInstaller --onefile --name context-life mmcp/__main__exe__.py --distpath dist --workpath build
          ls -la dist/

      - name: "Get exe hash for Scoop manifest"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        run: |
          EXE_HASH=$(sha256sum dist/context-life.exe | cut -d' ' -f1)
          echo "EXE_HASH=$EXE_HASH"
          echo "EXE_HASH=$EXE_HASH" >> $GITHUB_OUTPUT

      - name: "Get tag annotation (release notes)"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        run: |
          python scripts/bump-version.py --tag-msg "${{ steps.detect_tag.outputs.TAG }}" > /tmp/tag-message.txt

      - name: "Create release (if tag exists)"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.detect_tag.outputs.TAG }}
          name: "Context-Life ${{ steps.detect_tag.outputs.VERSION }}"
          files: dist/*.whl dist/context-life.exe
          body: |
            See tag annotation for release notes.
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Update release with tag notes"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        run: |
          RELEASE_ID=$(gh release view "${{ steps.detect_tag.outputs.TAG }}" --json id -q .id)
          TAG_BODY=$(cat /tmp/tag-message.txt)
          gh api PATCH /repos/${{ github.repository }}/releases/$RELEASE_ID -f body="$TAG_BODY"

      - name: "Info (no tag detected)"
        if: steps.tag_exists.outputs.TAG_EXISTS != 'true'
        run: |
          echo "No version tag found for this merge. Skipping release creation."
          echo "Tag '${{ steps.detect_tag.outputs.TAG }}' not found."
          echo "Version from pyproject.toml: ${{ steps.detect_tag.outputs.VERSION }}"
          echo ""
          echo "To create a release: tag the commit after merging, e.g.:"
          echo "  git tag -a v${{ steps.detect_tag.outputs.VERSION }} -m 'Release v${{ steps.detect_tag.outputs.VERSION }}'"
          echo "  git push origin v${{ steps.detect_tag.outputs.VERSION }}"
