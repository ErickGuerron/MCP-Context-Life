name: "Create Release on Merge to Main"

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    name: "Create GitHub Release"
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Install build tooling"
        run: python -m pip install --upgrade pip build pyinstaller

      - name: "Detect version tag"
        id: detect_tag
        shell: powershell
        run: |
          git fetch --tags --force
          if ("${{ github.event_name }}" -eq "push") {
            $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
            $version = $tag -replace '^v', ''
          } else {
            $prBaseBranch = "${{ github.event.pull_request.base.ref }}"
            echo "PR base: $prBaseBranch"
            $version = python scripts/get-version.py
            $tag = "v$version"
          }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: "Check if tag exists locally"
        id: tag_exists
        shell: powershell
        run: |
          $tag = "${{ steps.detect_tag.outputs.TAG }}"
          if (git rev-parse "$tag^{tag}" 2>$null) {
            echo "TAG_EXISTS=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            echo "TAG_EXISTS=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: "Build wheel and exe"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        shell: powershell
        run: |
          pip install pyinstaller
          python -m build --wheel
          python -m PyInstaller --onefile --name context-life mmcp/__main__.py --distpath dist --workpath build
          if (-not (Test-Path dist/context-life.exe)) { throw "context-life.exe was not generated" }
          echo "=== dist/ contents ==="
          Get-ChildItem dist/ | Format-Table Name, Length, LastWriteTime
          echo "=== exe size ==="
          Get-Item dist/context-life.exe | Format-Table Name, Length
          echo "=== exe sha256 ==="
          (Get-FileHash dist/context-life.exe -Algorithm SHA256 | Select-Object -ExpandProperty Hash)

      - name: "Get exe hash"
        id: exe_hash
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        shell: powershell
        run: |
          echo "=== SHA256 ==="
          $exeHash = (Get-FileHash dist/context-life.exe -Algorithm SHA256 | Select-Object -ExpandProperty Hash)
          echo "EXE_HASH=$exeHash"
          echo "EXE_HASH=$exeHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "=== File info ==="
          Get-Item dist/context-life.exe | Format-Table Name, Length, LastWriteTime

      - name: "Update Scoop bucket with real exe hash"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python scripts/update-scoop-hash.py "${{ steps.exe_hash.outputs.EXE_HASH }}" "${{ steps.detect_tag.outputs.VERSION }}"
          git add bucket/context-life.json
          git commit -m "chore(scoop): update exe hash for v${{ steps.detect_tag.outputs.VERSION }}"
          git push origin HEAD:refs/heads/develop --force

      - name: "Get tag annotation (release notes)"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        shell: powershell
        run: |
          python scripts/bump-version.py --tag-msg "${{ steps.detect_tag.outputs.TAG }}" | Out-File -FilePath $env:TEMP\tag-message.txt -Encoding utf8

      - name: "Create release (if tag exists)"
        if: steps.tag_exists.outputs.TAG_EXISTS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.detect_tag.outputs.TAG }}
          name: "Context-Life ${{ steps.detect_tag.outputs.VERSION }}"
          files: |
            dist/context-life.exe
            dist/*.whl
          fail_on_unmatched_files: true
          body_path: ${{ env.TEMP }}\tag-message.txt
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: Tag annotation body is already in the release via softprops/action-gh-release body field

      - name: "Info (no tag detected)"
        if: steps.tag_exists.outputs.TAG_EXISTS != 'true'
        shell: powershell
        run: |
          echo "No version tag found for this merge. Skipping release creation."
          echo "Tag '${{ steps.detect_tag.outputs.TAG }}' not found."
          echo "Version from pyproject.toml: ${{ steps.detect_tag.outputs.VERSION }}"
          echo ""
          echo "To create a release: tag the commit after merging, e.g.:"
          echo "  git tag -a v${{ steps.detect_tag.outputs.VERSION }} -m 'Release v${{ steps.detect_tag.outputs.VERSION }}'"
          echo "  git push origin v${{ steps.detect_tag.outputs.VERSION }}"
